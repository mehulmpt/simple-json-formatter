<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Left brace { -->
  <text x="18" y="96" font-family="SF Mono, Menlo, Consolas, monospace" font-size="80" font-weight="700" fill="#9cdcfe">{</text>

  <!-- Right brace } -->
  <text x="72" y="96" font-family="SF Mono, Menlo, Consolas, monospace" font-size="80" font-weight="700" fill="#9cdcfe">}</text>

  <!-- Colored dots representing JSON values -->
  <circle cx="56" cy="44" r="6" fill="#ce9178"/>
  <circle cx="56" cy="64" r="6" fill="#b5cea8"/>
  <circle cx="56" cy="84" r="6" fill="#569cd6"/>
</svg>
